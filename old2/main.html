<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sfoghi</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  
  <a class="site-title" href="index.html"><span class="title-black">sf.</span><span class="title-red">oghi</span></a>
  
  <div class="viewer">
    <!-- <button class="arrow" id="first" onclick="jumpTo(0)">&#9664;&#9664;</button> -->
    <!-- <button class="arrow" id="prev" onclick="navigate(-1)">&#9664;</button> -->

    <button class="arrow" id="first" onclick="jumpTo(0)">
      <span class="arr-single arr-left"></span>
      <span class="arr-single arr-left"></span>
    </button>
    <button class="arrow" id="prev" onclick="navigate(-1)">
      <span class="arr-single arr-left"></span>
    </button>
    
    <div class="entry-window">
      <div class="entry-header">
        <div class="entry-date"  id="entry-date"></div>
        <div class="entry-title" id="entry-title"></div>
      </div>
      <div class="entry-body" id="entry-body"></div>
    </div>
    <!-- <button class="arrow" id="next" onclick="navigate(1)">&#9654;</button> -->
    <!-- <button class="arrow" id="last" onclick="jumpTo(entries.length - 1)">&#9654;&#9654;</button> -->
    <button class="arrow" id="next" onclick="navigate(1)">
      <span class="arr-single arr-right"></span>
    </button>
    <button class="arrow" id="last" onclick="jumpTo(entries.length - 1)">
      <span class="arr-single arr-right"></span>
      <span class="arr-single arr-right"></span>
    </button>

  </div>

  <div class="counter" id="counter"></div>

  <script src="entries.js"></script>
  <script src="script.js"></script>

</body>
</html>
