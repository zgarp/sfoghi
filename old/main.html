<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sfoghi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f5f5f5;
      font-family: Georgia, serif;
      padding: 60px 20px;
    }

    /* ── Site title at the top ── */
    .site-title {
      font-size: 2rem;
      color: #111;
      letter-spacing: 0.05em;
      margin-bottom: 60px;
      text-decoration: none;
    }

    .site-title:hover {
      text-decoration: underline;
    }

    /* ── Entry viewer ── */
    .viewer {
      display: flex;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 720px;
    }

    /* Navigation arrows */
    .arrow {
      background: none;
      border: 1px solid #aaa;
      font-size: 1.4rem;
      width: 44px;
      height: 44px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      transition: background 0.15s;
    }

    .arrow:hover:not(:disabled) {
      background: #e0e0e0;
    }

    .arrow:disabled {
      opacity: 0.25;
      cursor: default;
    }

    /* The entry window — fixed size */
    .entry-window {
      flex: 1;
      border: 1px solid #ccc;
      background: #fff;
      height: 340px;        /* fixed height */
      display: flex;
      flex-direction: column;
      overflow: hidden;     /* clip everything to the box */
    }

    /* Pinned header: date + title never scroll */
    .entry-header {
      flex-shrink: 0;
      padding: 28px 32px 16px;
      border-bottom: 1px solid #eee;
    }

    .entry-date {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .entry-title {
      font-size: 1.3rem;
      color: #111;
    }

    /* Scrollable body area */
    .entry-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 32px 28px;
      font-size: 1rem;
      color: #333;
      line-height: 1.7;
    }

    /* Thin custom scrollbar */
    .entry-body::-webkit-scrollbar        { width: 4px; }
    .entry-body::-webkit-scrollbar-track  { background: transparent; }
    .entry-body::-webkit-scrollbar-thumb  { background: #ccc; border-radius: 2px; }

    /* Counter below the window */
    .counter {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #999;
      text-align: center;
      width: 100%;
      max-width: 720px;
    }
  </style>
</head>
<body>

  <a class="site-title" href="index.html">sfoghi</a>

  <div class="viewer">
    <button class="arrow" id="prev" onclick="navigate(-1)">&#8592;</button>
    <div class="entry-window">
      <div class="entry-header">
        <div class="entry-date" id="entry-date"></div>
        <div class="entry-title" id="entry-title"></div>
      </div>
      <div class="entry-body" id="entry-body"></div>
    </div>
    <button class="arrow" id="next" onclick="navigate(1)">&#8594;</button>
  </div>

  <div class="counter" id="counter"></div>

  <script>
    // ── Add your entries here ──────────────────────────────────────────────
    // Most recent first. The viewer starts at index 0 (the latest entry).
    const entries = [
      {
        date: "18 March 2026",
        title: "First entry",
        body: "This is the text of the first comment. You can write anything here — thoughts, updates, reflections. Add as much or as little as you like."
      },
      {
        date: "10 March 2026",
        title: "An earlier note",
        body: "This is an older entry. Use the arrow on the right to go forward to the newer one, or add more entries above this one in the array."
      },
      {
        date: "1 March 2026",
        title: "The beginning",
        body: "The very first note. When new entries are added at the top of the array, this one will be reachable by clicking the left arrow multiple times."
      }
    ];
    // ──────────────────────────────────────────────────────────────────────

    let current = 0;

    function render() {
      const e = entries[current];
      document.getElementById("entry-date").textContent  = e.date;
      document.getElementById("entry-title").textContent = e.title;
      document.getElementById("entry-body").textContent  = e.body;
      document.getElementById("counter").textContent     = `${current + 1} / ${entries.length}`;
      document.getElementById("prev").disabled = current === 0;
      document.getElementById("next").disabled = current === entries.length - 1;
    }

    function navigate(dir) {
      const next = current + dir;
      if (next >= 0 && next < entries.length) {
        current = next;
        render();
        document.getElementById("entry-body").scrollTop = 0;
      }
    }

    render();
  </script>

</body>
</html>
